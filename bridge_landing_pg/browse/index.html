<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:
    radial-gradient(ellipse at 15% 30%,rgba(160,40,255,.1) 0%,transparent 55%),
    radial-gradient(ellipse at 88% 70%,rgba(255,40,90,.08) 0%,transparent 55%),
    #0a0812;
  color:#fff;
  font-family:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:sticky;top:0;z-index:100;
  background:rgba(10,8,18,.85);
  backdrop-filter:blur(12px);
}
.logo{font-size:22px;font-weight:900;letter-spacing:-.5px;}
.logo .o{font-style:normal;}
.pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:99px;padding:5px 12px;font-size:12px;font-weight:600;
}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── Filters ── */
.filters{
  display:flex;gap:10px;flex-wrap:wrap;
  padding:16px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.filter-btn{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:99px;
  color:#fff;font-size:13px;font-weight:600;
  padding:7px 16px;cursor:pointer;
  transition:background .2s,border-color .2s;
}
.filter-btn:hover,.filter-btn.active{
  background:rgba(160,40,255,.25);
  border-color:rgba(160,40,255,.6);
}

/* ── Grid ── */
.container{max-width:1200px;margin:0 auto;padding:20px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}
@media(min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}}

/* ── Card ── */
.card{
  position:relative;border-radius:14px;overflow:hidden;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  transition:transform .2s,border-color .2s;
  cursor:pointer;
}
.card:hover{transform:translateY(-3px);border-color:rgba(160,40,255,.4);}
.card a{display:block;text-decoration:none;color:inherit;}

.card-img{
  position:relative;width:100%;padding-top:130%;overflow:hidden;
}
.card-img img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
  transition:transform .3s;
}
.card:hover .card-img img{transform:scale(1.04);}
.card-img-placeholder{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(160,40,255,.15),rgba(255,40,90,.1));
  display:flex;align-items:center;justify-content:center;font-size:40px;
}

.online-badge{
  position:absolute;top:8px;left:8px;
  display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  border-radius:99px;padding:3px 8px;font-size:11px;font-weight:700;
}
.online-badge .dot{width:6px;height:6px;}

.card-body{padding:10px 12px 12px;}
.card-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;}
.card-rating{font-size:12px;color:#fbbf24;margin-top:4px;}

/* ── Online toggle ── */
.toggle-row{
  display:flex;align-items:center;gap:10px;
  padding:0 20px 14px;
}
.toggle-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.6);}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{
  position:absolute;inset:0;border-radius:99px;
  background:rgba(255,255,255,.12);transition:background .2s;
}
.toggle input:checked ~ .toggle-track{background:#22c55e;}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;
  background:#fff;transition:transform .2s;
}
.toggle input:checked ~ .toggle-thumb{transform:translateX(18px);}

/* ── Card bio snippet ── */
.card-bio{
  font-size:11px;color:rgba(255,255,255,.4);
  margin-top:4px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* ── Skeleton loading ── */
.skeleton{
  background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:14px;
}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.card-skeleton{border-radius:14px;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);}
.card-skeleton .sk-img{padding-top:130%;position:relative;}
.card-skeleton .sk-img div{position:absolute;inset:0;}
.card-skeleton .sk-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px;}
.card-skeleton .sk-name{height:13px;border-radius:6px;width:70%;}
.card-skeleton .sk-meta{height:10px;border-radius:6px;width:45%;}

/* ── States ── */
.state-msg{
  text-align:center;padding:60px 20px;color:rgba(255,255,255,.4);
  font-size:15px;
}

/* ── Load more ── */
.load-more-wrap{text-align:center;padding:32px 0;}
.btn-load{
  background:linear-gradient(135deg,#a028ff,#ff285a);
  border:none;border-radius:99px;color:#fff;
  font-family:inherit;font-size:15px;font-weight:700;
  padding:14px 40px;cursor:pointer;
  transition:opacity .2s,transform .2s;
}
.btn-load:hover{opacity:.9;transform:scale(1.02);}
.btn-load:disabled{opacity:.4;cursor:default;transform:none;}

/* ── Footer ── */
.footer{text-align:center;padding:24px;font-size:12px;color:rgba(255,255,255,.2);}

<body>

<div class="topbar">
  <div class="logo">H<span class="o">🔥</span>tica</div>
  <a href="/news/" style="font-size:12px;font-weight:700;color:rgba(255,255,255,.5);text-decoration:none;padding:6px 12px;border:1px solid rgba(255,255,255,.1);border-radius:99px;transition:all .2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.5)'">📰 News</a>
  <div class="pill"><div class="dot"></div><span id="online-count">Loading…</span></div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-order="lastupdated">Recently Active</button>
  <button class="filter-btn" data-order="views">Most Viewed</button>
  <button class="filter-btn" data-order="rating">Highest Rated</button>
</div>
<div class="toggle-row">
  <span class="toggle-label">Available today only</span>
  <label class="toggle">
    <input type="checkbox" id="onlineToggle">
    <div class="toggle-track"></div>
    <div class="toggle-thumb"></div>
  </label>
</div>

<div class="container">
  <div id="grid" class="grid"></div>
  <div id="state" class="state-msg">
    <div class="spinner"></div>Loading profiles…
  </div>
  <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="btn-load" id="btn-load-more">Load More</button>
  </div>
</div>

<div class="footer">18+ Adults Only &nbsp;·&nbsp; All models are verified adults</div>

<script>
const API_BASE = '/api/aw-profiles';

let currentPage = 1;
let currentOrder = 'lastupdated';
let onlineOnly = false;
let isLoading = false;
let hasMore = true;

const grid        = document.getElementById('grid');
const state       = document.getElementById('state');
const loadMoreWrap= document.getElementById('load-more-wrap');
const btnLoadMore = document.getElementById('btn-load-more');
const onlineCount = document.getElementById('online-count');
const onlineToggle= document.getElementById('onlineToggle');

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function buildSkeleton() {
  const el = document.createElement('div');
  el.className = 'card-skeleton';
  el.innerHTML = `
    <div class="sk-img"><div class="skeleton"></div></div>
    <div class="sk-body">
      <div class="sk-name skeleton"></div>
      <div class="sk-meta skeleton"></div>
    </div>`;
  return el;
}

function showSkeletons(n = 12) {
  grid.innerHTML = '';
  for (let i = 0; i < n; i++) grid.appendChild(buildSkeleton());
}

function buildCard(p) {
  const card = document.createElement('div');
  card.className = 'card';

  const imgHtml = p.thumbnail
    ? `<img src="${esc(p.thumbnail)}" alt="${esc(p.nickname)}" loading="lazy" width="200" height="260">`
    : `<div class="card-img-placeholder">💋</div>`;

  const onlineBadge = p.isOnline
    ? `<div class="online-badge"><div class="dot" style="background:#22c55e;box-shadow:0 0 6px #22c55e;border-radius:50%;"></div>Available</div>`
    : '';

  const ratingHtml = p.rating
    ? `<div class="card-rating">★ ${Number(p.rating).toFixed(0)}</div>`
    : '';

  const locationHtml = p.location
    ? `<div class="card-meta">${esc(p.location.split(',')[0])}</div>`
    : '';

  const bioHtml = p.bio
    ? `<div class="card-bio">${esc(p.bio.slice(0, 80))}</div>`
    : '';

  card.innerHTML = `
    <a href="/profiles/${esc(p.userId)}" data-user="${esc(p.userId)}">
      <div class="card-img">
        ${imgHtml}
        ${onlineBadge}
      </div>
      <div class="card-body">
        <div class="card-name">${esc(p.nickname || 'Profile')}</div>
        ${locationHtml}
        ${ratingHtml}
        ${bioHtml}
      </div>
    </a>`;

  card.querySelector('a').addEventListener('click', () => {
    if (typeof gtag !== 'undefined') {
      gtag('event', 'profile_page_open', { user_id: p.userId, nickname: p.nickname });
    }
  });

  return card;
}

async function loadProfiles(reset) {
  if (isLoading) return;
  isLoading = true;
  btnLoadMore.disabled = true;

  if (reset) {
    currentPage = 1;
    hasMore = true;
    loadMoreWrap.style.display = 'none';
    state.style.display = 'none';
    showSkeletons(12);
  }

  try {
    const params = new URLSearchParams({
      page: currentPage,
      orderBy: currentOrder,
      limit: 24,
    });
    const res = await fetch(`${API_BASE}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Remove skeletons on first page
    if (currentPage === 1) {
      grid.querySelectorAll('.card-skeleton').forEach(el => el.remove());
    }

    let profiles = data.profiles || [];
    if (onlineOnly) profiles = profiles.filter(p => p.isOnline);

    if (profiles.length === 0 && currentPage === 1) {
      state.textContent = 'No profiles found. Try again shortly.';
      state.style.display = 'block';
      hasMore = false;
      loadMoreWrap.style.display = 'none';
      return;
    }

    profiles.forEach(p => grid.appendChild(buildCard(p)));

    const loaded = currentPage * 24;
    hasMore = loaded < (data.total || 0);
    loadMoreWrap.style.display = hasMore ? 'block' : 'none';

    const totalLabel = data.total ? data.total.toLocaleString() + ' profiles' : profiles.length + ' online';
    onlineCount.textContent = totalLabel;
    currentPage++;
  } catch (err) {
    grid.querySelectorAll('.card-skeleton').forEach(el => el.remove());
    state.innerHTML = 'Could not load profiles. <a href="" style="color:#a028ff">Refresh</a>';
    state.style.display = 'block';
  } finally {
    isLoading = false;
    btnLoadMore.disabled = false;
  }
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentOrder = btn.dataset.order;
  loadProfiles(true);
});

onlineToggle.addEventListener('change', () => {
  onlineOnly = onlineToggle.checked;
  loadProfiles(true);
});

btnLoadMore.addEventListener('click', () => loadProfiles(false));

loadProfiles(true);
</script>
</body>
