/* Sidebar skeleton */

<script>
const API_BASE = '/api/aw-profiles';
const NEWS_API = '/api/news';

// ── Helpers ──────────────────────────────────────────
function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

// ── Profile cards ─────────────────────────────────────
const grid        = document.getElementById('grid');
const state       = document.getElementById('state');
const loadMoreWrap= document.getElementById('load-more-wrap');
const btnLoadMore = document.getElementById('btn-load-more');
const onlineCount = document.getElementById('online-count');
const onlineToggle= document.getElementById('onlineToggle');

let currentPage  = 1;
let currentOrder = 'lastupdated';
let onlineOnly   = false;
let isLoading    = false;
let hasMore      = true;

function buildSkeleton() {
  const el = document.createElement('div');
  el.className = 'card-skeleton';
  el.innerHTML = `<div class="sk-img"><div class="skeleton sk-bg"></div></div><div class="sk-body"><div class="sk-name sk-bg"></div><div class="sk-meta sk-bg"></div></div>`;
  return el;
}
function showSkeletons(n = 12) {
  grid.innerHTML = '';
  for (let i = 0; i < n; i++) grid.appendChild(buildSkeleton());
}

function buildCard(p) {
  const card = document.createElement('div');
  card.className = 'card';

  const imgHtml = p.thumbnail
    ? `<img src="${esc(p.thumbnail)}" alt="${esc(p.nickname)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>💋</div>'">`
    : `<div class="card-img-placeholder">💋</div>`;

  const badge = p.isOnline
    ? `<div class="online-badge"><div class="dot" style="width:6px;height:6px;background:#22c55e;box-shadow:0 0 6px #22c55e;border-radius:50%;flex-shrink:0;"></div>Available</div>`
    : '';

  const rating   = p.rating   ? `<div class="card-rating">★ ${Number(p.rating).toFixed(0)}</div>` : '';
  const location = p.location ? `<div class="card-meta">${esc(p.location.split(',')[0])}</div>` : '';
  const bio      = p.bio      ? `<div class="card-bio">${esc(p.bio.slice(0, 80))}</div>` : '';

  card.innerHTML = `<a href="/profiles/${esc(p.userId)}" data-user="${esc(p.userId)}">
    <div class="card-img">${imgHtml}${badge}</div>
    <div class="card-body">
      <div class="card-name">${esc(p.nickname || 'Profile')}</div>
      ${location}${rating}${bio}
    </div>
  </a>`;

  card.querySelector('a').addEventListener('click', () => {
    if (typeof gtag !== 'undefined') gtag('event', 'profile_click', { user_id: p.userId });
  });
  return card;
}

async function loadProfiles(reset) {
  if (isLoading) return;
  isLoading = true;
  btnLoadMore.disabled = true;
  if (reset) {
    currentPage = 1; hasMore = true;
    loadMoreWrap.style.display = 'none';
    state.style.display = 'none';
    showSkeletons(12);
  }
  try {
    const params = new URLSearchParams({ page: currentPage, orderBy: currentOrder, limit: 24 });
    const res = await fetch(`${API_BASE}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (currentPage === 1) grid.querySelectorAll('.card-skeleton').forEach(el => el.remove());

    let profiles = data.profiles || [];
    if (onlineOnly) profiles = profiles.filter(p => p.isOnline);

    if (profiles.length === 0 && currentPage === 1) {
      state.textContent = 'No profiles found — check back shortly.';
      state.style.display = 'block';
      hasMore = false;
      return;
    }
    profiles.forEach(p => grid.appendChild(buildCard(p)));
    const loaded = currentPage * 24;
    hasMore = loaded < (data.total || 0);
    loadMoreWrap.style.display = hasMore ? 'block' : 'none';
    onlineCount.textContent = data.total ? data.total.toLocaleString() + ' profiles' : profiles.length + ' live';
    currentPage++;
  } catch (err) {
    grid.querySelectorAll('.card-skeleton').forEach(el => el.remove());
    state.innerHTML = 'Could not load profiles. <a href="" style="color:#a028ff">Refresh</a>';
    state.style.display = 'block';
  } finally {
    isLoading = false;
    btnLoadMore.disabled = false;
  }
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentOrder = btn.dataset.order;
  loadProfiles(true);
});
onlineToggle.addEventListener('change', () => { onlineOnly = onlineToggle.checked; loadProfiles(true); });
btnLoadMore.addEventListener('click', () => loadProfiles(false));

// ── News sidebar ──────────────────────────────────────
const sidebarContent = document.getElementById('sidebar-content');
const sidebarTabs    = document.getElementById('sidebar-tabs');
const CAT_ICONS = { gossip:'💄', crypto:'₿', sports:'⚽', world:'🌍' };
let sidebarCat = 'gossip';

function sidebarSkeletons() {
  return Array.from({length:5}, () => `
    <div class="ns-sk">
      <div class="sk-thumb sk-bg"></div>
      <div class="sk-lines">
        <div class="sk-src sk-bg"></div>
        <div class="sk-title sk-bg"></div>
        <div class="sk-title2 sk-bg"></div>
      </div>
    </div>`).join('');
}

function buildNewsItem(a) {
  const imgHtml = a.image
    ? `<img class="news-thumb" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=news-thumb-ph>${CAT_ICONS[sidebarCat]}</div>'">`
    : `<div class="news-thumb-ph">${CAT_ICONS[sidebarCat]}</div>`;
  return `
    <a class="news-item" href="${esc(a.link)}" target="_blank" rel="noopener noreferrer">
      ${imgHtml}
      <div class="news-text">
        <div class="news-source">${esc(a.source)}</div>
        <div class="news-title">${esc(a.title)}</div>
        <div class="news-time">${timeAgo(a.published)}</div>
      </div>
    </a>`;
}

async function loadSidebar(cat) {
  sidebarContent.innerHTML = sidebarSkeletons();
  try {
    const res = await fetch(`${NEWS_API}?category=${cat}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const items = (data.articles || []).slice(0, 7);
    sidebarContent.innerHTML = items.length
      ? items.map(buildNewsItem).join('')
      : '<div style="padding:20px;font-size:12px;color:rgba(255,255,255,.3);text-align:center;">No stories right now</div>';
  } catch {
    sidebarContent.innerHTML = '<div style="padding:20px;font-size:12px;color:rgba(255,255,255,.3);text-align:center;">Could not load news</div>';
  }
}

sidebarTabs.addEventListener('click', e => {
  const tab = e.target.closest('.stab');
  if (!tab) return;
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  sidebarCat = tab.dataset.cat;
  loadSidebar(sidebarCat);
});

// ── News ticker ───────────────────────────────────────
async function loadTicker() {
  try {
    const res = await fetch(`${NEWS_API}?category=gossip`);
    if (!res.ok) return;
    const data = await res.json();
    const articles = (data.articles || []).slice(0, 10);
    if (!articles.length) return;

    const ticker = document.getElementById('ticker-inner');
    const items  = articles.map(a =>
      `<a class="ticker-item" href="${esc(a.link)}" target="_blank" rel="noopener noreferrer"><span class="ticker-dot"></span>${esc(a.title)}</a>`
    ).join('');
    // Duplicate for seamless loop
    ticker.innerHTML = items + items;
  } catch { /* leave placeholder */ }
}

// ── Boot ─────────────────────────────────────────────
loadProfiles(true);
loadSidebar('gossip');
loadTicker();

// Refresh sidebar every 10 minutes
setInterval(() => loadSidebar(sidebarCat), 10 * 60 * 1000);
</script>
</body>
</html>
