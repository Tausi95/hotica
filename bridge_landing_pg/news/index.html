<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:
    radial-gradient(ellipse at 15% 30%,rgba(160,40,255,.1) 0%,transparent 55%),
    radial-gradient(ellipse at 88% 70%,rgba(255,40,90,.08) 0%,transparent 55%),
    #0a0812;
  color:#fff;
  font-family:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;
  min-height:100vh;
}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:sticky;top:0;z-index:100;
  background:rgba(10,8,18,.9);
  backdrop-filter:blur(14px);
}
.logo{font-size:22px;font-weight:900;letter-spacing:-.5px;text-decoration:none;color:#fff;}
.logo span{color:#ff3d71;}
.nav{display:flex;gap:6px;align-items:center;}
.nav a{
  font-size:12px;font-weight:700;color:rgba(255,255,255,.55);
  text-decoration:none;padding:6px 12px;border-radius:99px;
  border:1px solid transparent;transition:all .2s;
}
.nav a:hover{color:#fff;border-color:rgba(255,255,255,.12);}
.nav a.cta-nav{
  background:linear-gradient(135deg,#a028ff,#ff285a);
  color:#fff;border-color:transparent;
}
.nav a.cta-nav:hover{opacity:.9;}

/* ── Category tabs ── */
.tabs{
  display:flex;gap:8px;flex-wrap:wrap;
  padding:16px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.tab{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:99px;padding:8px 16px;
  font-size:13px;font-weight:700;cursor:pointer;color:#fff;
  transition:all .2s;
}
.tab:hover{background:rgba(160,40,255,.2);border-color:rgba(160,40,255,.5);}
.tab.active{
  background:linear-gradient(135deg,rgba(160,40,255,.35),rgba(255,40,90,.25));
  border-color:rgba(160,40,255,.7);
}
.tab-icon{font-size:16px;}

/* ── Layout ── */
.container{max-width:1100px;margin:0 auto;padding:24px 20px;}
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}
@media(min-width:600px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr);}}

/* ── Article card ── */
.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;overflow:hidden;
  transition:transform .2s,border-color .2s;
  display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-3px);border-color:rgba(160,40,255,.4);}
.card a{text-decoration:none;color:inherit;display:flex;flex-direction:column;height:100%;}
.card-img{
  width:100%;aspect-ratio:16/9;overflow:hidden;
  background:rgba(255,255,255,.04);
  position:relative;
}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block;}
.card:hover .card-img img{transform:scale(1.04);}
.card-img-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  background:linear-gradient(135deg,rgba(160,40,255,.1),rgba(255,40,90,.08));
}
.card-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column;gap:6px;}
.card-source{
  font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(160,40,255,.9);
}
.card-title{font-size:14px;font-weight:700;line-height:1.45;color:#fff;}
.card-summary{font-size:12px;color:rgba(255,255,255,.45);line-height:1.6;flex:1;}
.card-time{font-size:11px;color:rgba(255,255,255,.25);margin-top:4px;}
.card-ext{
  font-size:11px;font-weight:700;color:rgba(160,40,255,.7);
  margin-top:6px;display:flex;align-items:center;gap:4px;
}

/* ── Skeleton ── */
.sk{
  background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.card-sk{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;}
.card-sk .sk-img{aspect-ratio:16/9;}
.card-sk .sk-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.card-sk .sk-src{height:10px;width:60px;}
.card-sk .sk-title{height:14px;width:100%;}
.card-sk .sk-title2{height:14px;width:75%;}
.card-sk .sk-sum{height:11px;width:100%;margin-top:4px;}

/* ── CTA strip ── */
.cta-strip{
  background:linear-gradient(135deg,rgba(160,40,255,.12),rgba(255,40,90,.08));
  border:1px solid rgba(160,40,255,.2);
  border-radius:16px;padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  flex-wrap:wrap;margin-top:32px;
}
.cta-strip-text h3{font-size:16px;font-weight:800;margin-bottom:4px;}
.cta-strip-text p{font-size:13px;color:rgba(255,255,255,.5);}
.btn-cta{
  background:linear-gradient(135deg,#a028ff,#ff285a);
  border:none;border-radius:99px;color:#fff;
  font-family:inherit;font-size:14px;font-weight:800;
  padding:12px 28px;cursor:pointer;white-space:nowrap;
  text-decoration:none;display:inline-block;
  transition:opacity .2s,transform .2s;
}
.btn-cta:hover{opacity:.9;transform:scale(1.02);}

/* ── Section heading ── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.section-head h2{font-size:18px;font-weight:800;}
.section-head span{font-size:12px;color:rgba(255,255,255,.3);}

/* ── State ── */
.state-msg{text-align:center;padding:60px 20px;color:rgba(255,255,255,.35);font-size:15px;}

/* ── Footer ── */
.footer{text-align:center;padding:32px 20px;font-size:12px;color:rgba(255,255,255,.2);border-top:1px solid rgba(255,255,255,.05);margin-top:40px;}
.footer a{color:rgba(255,255,255,.35);text-decoration:none;}

<body>

<div class="topbar">
  <a class="logo" href="/">H<span>🔥</span>tica</a>

    <a href="/browse/">Browse Profiles</a>
    <a href="/browse/" class="cta-nav">Find a Match 🔥</a>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="gossip"><span class="tab-icon">💄</span>Celebrity Gossip</button>
  <button class="tab" data-cat="crypto"><span class="tab-icon">₿</span>Crypto</button>
  <button class="tab" data-cat="sports"><span class="tab-icon">⚽</span>Football &amp; Sports</button>
  <button class="tab" data-cat="world"><span class="tab-icon">🌍</span>World News</button>
</div>

<div class="container">
  <div class="section-head">
    <h2 id="section-title">Celebrity Gossip</h2>
    <span id="update-time"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="state-msg" id="state" style="display:none"></div>

  <div class="cta-strip">
    <div class="cta-strip-text">
      <h3>Need some company tonight? 🔥</h3>
      <p>27,000+ verified profiles available right now on HOTICA.</p>
    </div>
    <a class="btn-cta" href="/browse/">Browse Profiles →</a>
  </div>
</div>

<div class="footer">
  <p>News sourced from public RSS feeds. All rights belong to original publishers.</p>
  <p style="margin-top:8px"><a href="/">HOTICA</a> · <a href="/browse/">Browse Profiles</a> · 18+ Adults Only</p>
</div>

<script>
const CATEGORY_LABELS = {
  gossip: 'Celebrity Gossip',
  crypto: 'Crypto News',
  sports: 'Football &amp; Sports',
  world:  'World News',
};

const CATEGORY_ICONS = {
  gossip: '💄', crypto: '₿', sports: '⚽', world: '🌍',
};

let currentCat = 'gossip';

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60)   return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400)return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildCard(a) {
  const imgHtml = a.image
    ? `<img src="${esc(a.image)}" alt="${esc(a.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-ph>${CATEGORY_ICONS[currentCat]}</div>'">`
    : `<div class="card-img-ph">${CATEGORY_ICONS[currentCat]}</div>`;

  return `
    <div class="card">
      <a href="${esc(a.link)}" target="_blank" rel="noopener noreferrer" onclick="track('${esc(currentCat)}','${esc(a.source)}')">
        <div class="card-img">${imgHtml}</div>
        <div class="card-body">
          <div class="card-source">${esc(a.source)}</div>
          <div class="card-title">${esc(a.title)}</div>
          ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ''}
          <div class="card-time">${timeAgo(a.published)}</div>
          <div class="card-ext">Read full story ↗</div>
        </div>
      </a>
    </div>`;
}

function buildSkeletons(n) {
  return Array.from({length: n}, () => `
    <div class="card-sk">
      <div class="sk-img sk"></div>
      <div class="sk-body">
        <div class="sk-src sk"></div>
        <div class="sk-title sk"></div>
        <div class="sk-title2 sk"></div>
        <div class="sk-sum sk"></div>
      </div>
    </div>`).join('');
}

async function loadNews(cat) {
  const grid  = document.getElementById('grid');
  const state = document.getElementById('state');
  state.style.display = 'none';
  grid.innerHTML = buildSkeletons(6);
  document.getElementById('section-title').innerHTML = CATEGORY_LABELS[cat] || cat;
  document.getElementById('update-time').textContent = '';

  try {
    const res = await fetch(`/api/news?category=${cat}`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    if (!data.articles || data.articles.length === 0) {
      grid.innerHTML = '';
      state.textContent = 'No stories right now — check back shortly.';
      state.style.display = 'block';
      return;
    }

    grid.innerHTML = data.articles.map(buildCard).join('');
    document.getElementById('update-time').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

    if (typeof gtag !== 'undefined') {
      gtag('event', 'news_loaded', { category: cat, count: data.articles.length });
    }
  } catch(e) {
    grid.innerHTML = '';
    state.innerHTML = 'Could not load news. <a href="" style="color:#a028ff">Try again</a>';
    state.style.display = 'block';
  }
}

function track(cat, source) {
  if (typeof gtag !== 'undefined') {
    gtag('event', 'news_click', { category: cat, source });
  }
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentCat = tab.dataset.cat;
  loadNews(currentCat);
});

loadNews(currentCat);
</script>
</body>
